# Hazard Forge CI
#
# IMPORTANT: This file lives at ci/github-actions-ci.yml on purpose. The repo's GitHub token
# currently LACKS the `workflow` scope, so committing a file under .github/workflows/ would make
# `git push` fail. To ENABLE CI, move this file to .github/workflows/ci.yml with a token that has
# the workflow scope (see ci/README.md).
#
# What it does:
#   * windows-vulkan : conan install (cppstd=17 + Ninja; also pulls the Khronos validation layer)
#                      -> cmake configure (runs the material_codegen build-time tool that bakes the
#                      *.mat.json material graphs into the committed generated HLSL) -> build ->
#                      ctest (37 tests). This is the same pipeline scripts/verify.ps1 runs locally
#                      for Windows, plus the Slice-AL introspection JSON golden (an exact byte match
#                      of the live --introspect output vs tests/golden/introspect/default_scene.json),
#                      the Slice-BI material-graph introspection JSON golden (an exact byte match of a
#                      fresh --material-introspect vs tests/golden/material/showcase3_graph.json), and
#                      the Slice-BB audio WAV golden (an exact byte match of a fresh --audio-render
#                      vs tests/golden/audio/scene.wav); all three are backend-agnostic, so they are
#                      verified only on the Windows side. The Vulkan validation gate (core +
#                      synchronization validation, every showcase VUID/SYNC-HAZARD/[ERROR]-free) runs
#                      locally via scripts/verify.ps1.
#   * windows-asan   : the AddressSanitizer build (HF_SANITIZE=address) of the pure-C++ core + tests,
#                      then ctest under ASan (same 37 tests, the pure ones instrumented; rhi_smoke
#                      drives the live Vulkan device and is intentionally not sanitized).
#   * macos-metal    : documented below. Builds metal_headless ONCE, then renders + golden-compares
#                      ALL 37 committed Metal goldens (each visual_test showcase flag) at threshold
#                      0.0 (every diff must be 0.0000). GitHub-hosted macOS runners are x86_64/ARM
#                      cloud VMs that CANNOT reach the LAN bench Mac, and they have no Metal GPU for
#                      an offscreen golden compare that matches the bench. Run it on a SELF-HOSTED
#                      runner on the bench Mac, or manually via scripts/verify.ps1 (which drives the
#                      bench Mac over SSH and runs the same 37-golden loop). The job below is gated to
#                      self-hosted and is a no-op otherwise.

name: ci

on:
  push:
    branches: [master, "p3-*"]
  pull_request:
  workflow_dispatch:

jobs:
  windows-vulkan:
    name: Windows / Vulkan (build + ctest)
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python (for Conan)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Conan
        run: pip install "conan>=2.0"

      - name: Conan profile
        run: conan profile detect --force

      - name: Conan install (cppstd=17 + Ninja generator)
        run: >
          conan install . -of build/windows-msvc-debug
          -s build_type=Debug -s compiler.cppstd=17
          -c tools.cmake.cmaketoolchain:generator=Ninja
          --build=missing

      # The MSVC dev environment (cl, ninja on PATH) for the configure/build steps.
      - name: Enable MSVC dev shell
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      - name: CMake configure
        run: cmake --preset windows-msvc-debug

      - name: Build
        run: cmake --build --preset windows-msvc-debug

      - name: Test (ctest, 37 tests)
        run: ctest --preset windows-msvc-debug --output-on-failure

      # Slice-AL introspection JSON golden: an EXACT byte match of the live --introspect output for
      # the default scene vs the committed text golden. Backend-agnostic (pure hf_core), so it is
      # verified ONLY here (the bytes are identical on Vulkan and Metal). Mirrors scripts/verify.ps1.
      - name: Introspection JSON golden (exact byte match)
        shell: pwsh
        run: |
          $exe = 'build/windows-msvc-debug/samples/hello_triangle/hello_triangle.exe'
          $golden = 'tests/golden/introspect/default_scene.json'
          $live = Join-Path $env:TEMP 'hf_introspect_live.json'
          & $exe --introspect $live
          if ($LASTEXITCODE -ne 0) { throw 'introspect run failed' }
          $g = [System.IO.File]::ReadAllBytes((Resolve-Path $golden).Path)
          $l = [System.IO.File]::ReadAllBytes($live)
          if ($g.Length -ne $l.Length -or [System.Convert]::ToBase64String($g) -ne [System.Convert]::ToBase64String($l)) {
            throw "introspection JSON golden MISMATCH ($golden)"
          }
          Write-Host 'introspection JSON golden: exact match'

      # Slice-BI material-graph introspection JSON golden: an EXACT byte match of a fresh
      # --material-introspect dump of the showcase3 material graph vs the committed text golden.
      # DescribeGraphJson is a deterministic pure-CPU string builder (stable node/port/edge order), so
      # the bytes are identical across compilers and runs; backend-agnostic (pure hf_core), verified
      # ONLY here.
      - name: Material-graph introspection JSON golden (exact byte match)
        shell: pwsh
        run: |
          $exe = 'build/windows-msvc-debug/samples/hello_triangle/hello_triangle.exe'
          $golden = 'tests/golden/material/showcase3_graph.json'
          $live = Join-Path $env:TEMP 'hf_mat_introspect_live.json'
          & $exe --material-introspect assets/materials/showcase3.mat.json $live
          if ($LASTEXITCODE -ne 0) { throw 'material-introspect run failed' }
          $g = [System.IO.File]::ReadAllBytes((Resolve-Path $golden).Path)
          $l = [System.IO.File]::ReadAllBytes($live)
          if ($g.Length -ne $l.Length -or [System.Convert]::ToBase64String($g) -ne [System.Convert]::ToBase64String($l)) {
            throw "material-graph introspection JSON golden MISMATCH ($golden)"
          }
          Write-Host 'material-graph introspection JSON golden: exact match'

      # Slice-BB audio WAV golden: an EXACT byte match of a fresh --audio-render of the fixed scene
      # vs the committed WAV golden. The mixer is integer/fixed-point end to end, so the bytes are
      # identical across compilers and runs; backend-agnostic (pure hf_core), verified ONLY here.
      - name: Audio WAV golden (exact byte match)
        shell: pwsh
        run: |
          $exe = 'build/windows-msvc-debug/samples/hello_triangle/hello_triangle.exe'
          $golden = 'tests/golden/audio/scene.wav'
          $live = Join-Path $env:TEMP 'hf_audio_live.wav'
          & $exe --audio-render $live
          if ($LASTEXITCODE -ne 0) { throw 'audio-render run failed' }
          $g = [System.IO.File]::ReadAllBytes((Resolve-Path $golden).Path)
          $l = [System.IO.File]::ReadAllBytes($live)
          if ($g.Length -ne $l.Length -or [System.Convert]::ToBase64String($g) -ne [System.Convert]::ToBase64String($l)) {
            throw "audio WAV golden MISMATCH ($golden)"
          }
          Write-Host 'audio WAV golden: exact match'

  windows-asan:
    name: Windows / AddressSanitizer (pure tests)
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python (for Conan)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Conan
        run: pip install "conan>=2.0"

      - name: Conan profile
        run: conan profile detect --force

      - name: Conan install (asan output dir)
        run: >
          conan install . -of build/windows-msvc-asan
          -s build_type=Debug -s compiler.cppstd=17
          -c tools.cmake.cmaketoolchain:generator=Ninja
          --build=missing

      - name: Enable MSVC dev shell
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      # The conan-generated CMakeUserPresets.json may include both debug and asan conan presets,
      # which collide on the auto-named "conan-debug" preset. Pin it to the asan include only.
      - name: Pin CMakeUserPresets to the asan build
        shell: pwsh
        run: |
          @'
          {
            "version": 4,
            "vendor": { "conan": {} },
            "include": [ "build/windows-msvc-asan/build/Debug/generators/CMakePresets.json" ]
          }
          '@ | Set-Content -Encoding UTF8 CMakeUserPresets.json

      - name: CMake configure (HF_SANITIZE=address)
        run: cmake --preset windows-msvc-asan

      - name: Build (ASan)
        run: cmake --build --preset windows-msvc-asan

      - name: Test under ASan (ctest, 37 tests)
        run: ctest --preset windows-msvc-asan --output-on-failure

  # ---------------------------------------------------------------------------------------------------
  # Mac / Metal goldens. GitHub-hosted runners cannot reach the LAN bench Mac and have no matching
  # Metal GPU, so this job ONLY runs on a self-hosted runner labelled 'metal' (set one up on the
  # bench Mac). On hosted infra the job is skipped. For day-to-day verification, run the Metal half
  # via scripts/verify.ps1 from the Windows dev box (it SSHes into the bench Mac and runs the SAME
  # 37-golden loop below). This builds metal_headless once then renders + compares every committed
  # golden at threshold 0.0; the job fails if ANY golden diffs != 0.0000.
  # ---------------------------------------------------------------------------------------------------
  macos-metal:
    name: Mac / Metal (37 goldens, DIFF 0.0) [self-hosted only]
    runs-on: [self-hosted, macos, metal]
    if: ${{ contains(github.event.repository.topics, 'enable-self-hosted-metal') || github.event_name == 'workflow_dispatch' }}
    steps:
      - uses: actions/checkout@v4

      - name: Source the Metal env and build headless (once)
        run: |
          source ~/mac-remote-rig/env.sh
          cmake -S metal_headless -B build-metal -G Ninja
          cmake --build build-metal

      # Render + golden-compare all 37 showcases. Each entry is "<golden-basename>|<visual_test flag>"
      # (empty flag = the default Slice-F scene). Flags are the real ones parsed in
      # metal_headless/visual_test.mm. The loop does not abort on a single failure so the full table
      # prints; a trailing check fails the job if any golden drifted.
      - name: Render + compare all 37 goldens (each must be DIFF 0.0000)
        run: |
          source ~/mac-remote-rig/env.sh
          fail=0
          PAIRS='scene_shadow|
          skinning|--skinning
          pbr_helmet|--pbr
          instanced|--instanced
          ibl_helmet|--ibl
          physics|--physics
          transparency|--transparency
          bloom|--bloom
          scene_import|--scene
          debug_viz|--debug
          anim_blend|--blend
          ssao|--ssao
          capstone|--capstone
          camera_pose|--camera 0.2,-0.1,0,3,10
          gizmo|--gizmo 2
          csm|--csm
          spot|--spot
          point_shadow|--point-shadow
          clustered|--clustered
          ssr|--ssr
          volumetric|--volumetric
          probe|--probe
          taa|--taa
          cull|--cull
          gpu_cull|--gpu-cull
          mt|--mt
          mat_graph|--material
          mat_graph2|--material2
          mat_multi|--material-multi
          mat_normal|--material-normal
          game|--game
          hud|--hud
          game_hud|--game-hud
          stream|--stream
          terrain|--terrain
          decal|--decal
          terrain_stream|--terrain-stream'
          while IFS='|' read -r name flag; do
            [ -z "$name" ] && continue
            out="/tmp/hf_${name}.png"
            golden="tests/golden/metal/${name}.png"
            if [ -z "$flag" ]; then
              ./build-metal/visual_test "$out"
            else
              ./build-metal/visual_test $flag "$out"
            fi
            if ~/mac-remote-rig/compare.sh "$golden" "$out" 0.0; then
              echo "PASS  $name"
            else
              echo "FAIL  $name (DIFF != 0.0000)"
              fail=1
            fi
          done <<< "$PAIRS"
          if [ "$fail" -ne 0 ]; then
            echo "::error::one or more Metal goldens drifted (DIFF != 0.0000)"
            exit 1
          fi
          echo "All 37 Metal goldens at DIFF 0.0000"
